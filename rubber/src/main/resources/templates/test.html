<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .swiper {
        width: 1200px;
        height: 800px;
    }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<body>

    <button id="rotation">console.log() rotation</button><br>
    <img id="knob" src="https://assets.codepen.io/16327/knob_Base.png" width="410" height="410">

</body>
<script src="/src/main/resources/static/JS/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/Draggable.min.js"></script>
<script src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/InertiaPlugin.min.js"></script>
<script>
    gsap.registerPlugin(Draggable, InertiaPlugin);

    console.clear();


    //it doesn't get much easier than this ;)
    const draggable = Draggable.create("#knob", {
        type: "rotation",
        inertia: true,
        onDrag: function () {
            console.log(this.rotation)
        }
    });

    $("#rotation").click(function () {
        console.log(gsap.getProperty("#knob", "rotation"), "from element");
        console.log(Draggable.get("#knob").rotation, "from the Draggable");
    });

</script>

</html>
