<style>
	.card-container {
		width: 80%;
		margin: 0 auto;
	}

	.card {
		width: 250px;
		height: 350px;
		perspective: 1000px;
		margin: 0 10px;
	}

	.card-inner {
		width: 100%;
		height: 100%;
		transition: transform 0.6s;
		transform-style: preserve-3d;
	}

	.card:hover .card-inner {
		transform: rotateY(180deg);
	}

	.card-front,
	.card-back {
		position: absolute;
		width: 100%;
		height: 100%;
		backface-visibility: hidden;
		display: flex;
		align-items: center;
		justify-content: center;
		border: 1px solid #ccc;
		border-radius: 10px;
	}

	.card-front {
		background-color: #fff;
	}

	.card-back {
		background-color: #f4f4f4;
		transform: rotateY(180deg);
	}
</style>
