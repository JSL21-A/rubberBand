<style>
	body {
		padding: 0;
		margin: 0;
	}

	.card-container {
		position: relative;
		width: 50%;
		height: 50%;
		top: 100%;
		left: 25%;
		/* margin: 0 auto; */
		transform-origin: 50% 50%;
		background-color: red;
	}

	.card {
		width: 250px;
		height: 350px;
		perspective: 1000px;
		margin: 0 10px;
	}

	.card-inner {
		width: 100%;
		height: 100%;
		transition: transform 0.6s;
		transform-style: preserve-3d;
	}

	.card:hover .card-inner {
		transform: rotateY(180deg);
	}

	.card-front,
	.card-back {
		position: absolute;
		width: 100%;
		height: 100%;
		backface-visibility: hidden;
		display: flex;
		align-items: center;
		justify-content: center;
		border: 1px solid #ccc;
		border-radius: 10px;
	}

	.card-front {
		background-color: #fff;
	}

	.card-back {
		background-color: #f4f4f4;
		transform: rotateY(180deg);
	}
</style>

<script src="/src/main/resources/static/JS/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/Draggable.min.js"></script>
<script>
	gsap.registerPlugin(Draggable);

	var card = $('.card-container');
	let rotation = 0;
	let velocity = 0;
	let isDragging = false;
	let lastRotation = 0;
	let raf;

	//it doesn't get much easier than this ;)
	const draggable = Draggable.create(card.get(0), {
		type: "rotation",
		onDragStart: function () {
			isDragging = true;
			cancelAnimationFrame(raf);
			velocity = 0;
		},
		onDrag: function () {
			rotation = gsap.getProperty(card.get(0), "rotation");
			velocity = rotation - lastRotation;
			lastRotation = rotation;
		},
		onDragEnd: function () {
			isDragging = false;
			animateInertia();
		}
	});

	function animateInertia() {
		if (!isDragging) {
			// 점차 속도를 줄임 (velocity = 감속 계수)
			velocity *= 0.95;
			rotation += velocity;

			gsap.set(card.get(0), { rotation });

			// 속도가 거의 0이면 스냅 처리
			if (Math.abs(velocity) > 0.5) {
				raf = requestAnimationFrame(animateInertia);
			} else {
				snapToClosestAngle(); // 가장 가까운 각도로 스냅
			}
		}
	}

	function snapToClosestAngle() {
		let nextMultiple;

		const isClockwise = rotation > lastRotation; // 시계방향 회전 여부 확인

		// 시계방향 (양수로 증가) 일 때
		if (isClockwise) {
			nextMultiple = Math.ceil(rotation / 15) * 15;  // 다음 15도 배수
		}
		// 반시계방향 (음수로 감소) 일 때
		else {
			nextMultiple = Math.floor(rotation / 15) * 15;  // 이전 15도 배수
		}

		console.log("스냅될 각도:", nextMultiple);

		gsap.to(card.get(0), {
			rotation: nextMultiple,
			duration: 0.7,
			ease: "power1.out"
		});

		$("#rotation").click(function () {
			console.log(gsap.getProperty(card.get(0), "rotation"), "from element");
			console.log(Draggable.get(card.get(0)).rotation, "from the Draggable");
		});
	}
</script>
